# ==========================
# Application Settings
# ==========================
spring.application.name=screenshot-monitor-agent
server.port=9090
spring.main.headless=false

# Default Profile
spring.profiles.active=dev

# ==========================
# Screenshot Agent Settings
# ==========================
agent.agent-id=${AGENT_ID}
agent.screenshot.storage-path=./screenshots
agent.screenshot.interval-minutes=5




# Legacy keys (kept for backward compatibility)
# NOTE: These duplicate the new agent.* keys above
# duplicate of agent.screenshot-interval-minutes
screenshot.interval.minutes=15   
screenshot.storage.path=./screenshots   # duplicate of agent.storage-path
agent.id=${AGENT_ID}   # duplicate of agent.agent-id



# ==========================
# JPA / Hibernate Settings
# ==========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ==========================
# JWT Settings (1 hour)
# ==========================
jwt.expiration=3600000

# ==========================
# App Tracking
# ==========================
os.type=windows

# ==========================
# Application URLs
# ==========================
app.base-url=http://localhost:9090
app.reset-password.path=/api/auth/reset-password?token=

# ==========================
# Web Tracking Agent
# ==========================
backend.website.url=/api/website-usage
agent.website.interval=5000 