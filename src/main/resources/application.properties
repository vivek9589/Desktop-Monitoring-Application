# ==========================
# Core Application Settings
# ==========================
spring.application.name=screenshot-monitor-agent
server.port=9090
spring.main.headless=false
spring.profiles.active=dev

# ==========================
# Unified Agent Identities
# ==========================
agent.id=${AGENT_ID:agent-001}
# Legacy compatibility
agent.agent-id=${agent.id}

# ==========================
# Agent Behavior (Intervals & Paths)
# ==========================
agent.screenshot.interval-minutes=5
agent.screenshot.storage-path=./screenshots
backend.api.screenshot-upload-path=/api/screenshots/upload

os.type=windows
agent.app.interval=5000


# ============================
# WEB TRACKING AGENT
# ============================

backend.website.path=/api/website-usage
agent.website.interval=5000

# ============================
# MOUSE/KEYBOARD  TRACKING AGENT
# ============================

agent.tracking.activity-rate-ms=5000
agent.tracking.idle-check-rate-ms=5000

# ============================
# WEB TRACKING AGENT
# ============================

# AUTH PATH (Crucial for AuthServiceImpl)
app.reset-password.path=/api/auth/reset-password?token=

# ==========================
# JPA / JWT Defaults
# ==========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
jwt.expiration=3600000






