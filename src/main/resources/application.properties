# ==========================
# Application Settings
# ==========================
spring.application.name=screenshot.monitor.agent
server.port=9090
spring.main.headless=false

# Screenshot Settings
screenshot.interval.minutes=5
screenshot.storage.path=./screenshots
agent.id=

# Backend API
backend.api.screenshot-upload-url=http://localhost:9090/api/screenshots/upload

# ==========================
# Database Settings (MySQL)
# ==========================
spring.datasource.url=jdbc:mysql://localhost:3306/DesktopMonitoringDB?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

