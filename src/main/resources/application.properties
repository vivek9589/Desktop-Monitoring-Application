# ==========================
# Application Settings
# ==========================
spring.application.name=screenshot-monitor-agent
server.port=9090
spring.main.headless=false

# Default Profile
spring.profiles.active=dev

# ==========================
# Screenshot Agent Settings
# ==========================
agent.agent-id=${AGENT_ID}
agent.storage-path=./screenshots
agent.screenshot-interval-minutes=15

# Legacy keys (Keeping for compatibility with existing code)
screenshot.interval.minutes=15
screenshot.storage.path=./screenshots
agent.id=${AGENT_ID}

# ==========================
# JPA / Hibernate Settings
# ==========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ==========================
# JWT Settings (1 hour)
# ==========================
jwt.expiration=3600000

# ==========================
# App Tracking
# ==========================
os.type=windows