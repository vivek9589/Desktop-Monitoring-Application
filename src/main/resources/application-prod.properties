# ==========================
# Connectivity (Production)
# ==========================
app.base-url=https://api.braininventory.com
backend.api.key=${PROD_BACKEND_API_KEY}
backend.activity.url=${app.base-url}/api/monitor/activity

# ==========================
# Database (Production)
# ==========================
spring.datasource.url=${PROD_DB_URL}
spring.datasource.username=${PROD_DB_USER}
spring.datasource.password=${PROD_DB_PASS}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ==========================
# Mail & Security (Production)
# ==========================
spring.mail.username=${PROD_MAIL_USER}
spring.mail.password=${PROD_MAIL_PASS}
jwt.secret=${PROD_JWT_SECRET}

# ==========================
# Production Logging
# ==========================
logging.level.root=WARN
logging.level.com.braininventory=INFO




