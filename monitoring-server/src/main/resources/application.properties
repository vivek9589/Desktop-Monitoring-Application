# ==========================
# Server Core Settings
# ==========================
spring.application.name=monitoring-server
server.port=9090
app.base-url=http://localhost:9090
spring.profiles.active=dev

# ==========================
# Database (Internal Only)
# ==========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ==========================
# Security & JWT
# ==========================
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000
app.reset-password.path=/api/auth/reset-password?token=

# ==========================
# Cloudinary (Backend handles uploads)
# ==========================
cloudinary.cloud_name=${CLOUD_NAME}
cloudinary.api_key=${CLOUD_API_KEY}
cloudinary.api_secret=${CLOUD_API_SECRET}

# ==========================
# Mail (Notifications)
# ==========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Localization
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata