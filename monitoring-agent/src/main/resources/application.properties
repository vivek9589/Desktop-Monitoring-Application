# ==========================
# Agent Identity & Behavior
# ==========================
spring.application.name=monitoring-agent
# Agent doesn't need a fixed port (client-side)
server.port=0           
spring.main.headless=false

# Identity
agent.id=${AGENT_ID:agent-001}

# Intervals (Custom Agent Logic)
agent.screenshot.interval-minutes=20
agent.app.interval=5000
agent.website.interval=5000
agent.tracking.activity-rate-ms=5000
agent.tracking.idle-check-rate-ms=5000

# ==========================
# Connectivity (Where to send data)
# ==========================
# In dev, this is localhost:9090. In prod, it's your real domain.
app.base-url=${SERVER_URL:http://localhost:9090}
backend.api.key=${BACKEND_API_KEY:dev-secret-key}

# Endpoint Paths
backend.api.screenshot-upload-path=/api/screenshots/upload
backend.activity.url=${app.base-url}/api/monitor/activity
backend.website.path=/api/website-usage

# Local Storage
agent.screenshot.storage-path=./screenshots
os.type=windows